name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ghcr.io/vitorlopes079/docbot/api-gateway:latest

      - name: Build and push git-service
        uses: docker/build-push-action@v5
        with:
          context: ./git-service
          push: true
          tags: ghcr.io/vitorlopes079/docbot/git-service:latest

      - name: Build and push agent-service
        uses: docker/build-push-action@v5
        with:
          context: ./agent-service
          push: true
          tags: ghcr.io/vitorlopes079/docbot/agent-service:latest

      - name: Build and push doc-service
        uses: docker/build-push-action@v5
        with:
          context: ./doc-service
          push: true
          tags: ghcr.io/vitorlopes079/docbot/doc-service:latest

      - name: Build and push job-service
        uses: docker/build-push-action@v5
        with:
          context: ./job-service
          push: true
          tags: ghcr.io/vitorlopes079/docbot/job-service:latest

      - name: Build and push storage-service
        uses: docker/build-push-action@v5
        with:
          context: ./storage-service
          push: true
          tags: ghcr.io/vitorlopes079/docbot/storage-service:latest

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ghcr.io/vitorlopes079/docbot/auth-service:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/vitorlopes079/docbot/frontend:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://repodoc.tech

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/repodoc
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
